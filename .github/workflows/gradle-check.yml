name: 'Gradle Check'
on:
  workflow_call:
    inputs:
      java-version:
        description: 'JDK version to use'
        type: 'string'
        required: false
        default: '17'
      gradle-command:
        description: 'Gradle command to run'
        type: 'string'
        required: false
        default: './gradlew check'
permissions:
  contents: 'read'
jobs:
  check:
    name: 'Check'
    runs-on: 'ubuntu-latest'
    steps:
    - id: 'step-0'
      name: 'Check out'
      uses: 'actions/checkout@v6'
    - id: 'step-1'
      name: 'Set up Java'
      uses: 'actions/setup-java@v5'
      with:
        java-version: '${{ inputs.java-version }}'
        distribution: 'temurin'
    - id: 'step-2'
      name: 'Setup Gradle'
      uses: 'gradle/actions/setup-gradle@v5'
      with:
        cache-read-only: 'true'
        gradle-home-cache-cleanup: 'true'
    - id: 'step-3'
      name: 'Check'
      run: '${{ inputs.gradle-command }}'
