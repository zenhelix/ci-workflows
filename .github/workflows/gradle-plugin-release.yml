name: 'Gradle Plugin Release'

on:
  workflow_call:
    inputs:
      java-version:
        description: 'JDK version to use'
        type: 'string'
        required: false
        default: '17'
      publish-command:
        description: 'Gradle publish command (publishes to both Maven Central and Gradle Portal)'
        type: 'string'
        required: true
      changelog-config:
        description: 'Path to changelog configuration file'
        type: 'string'
        required: false
        default: '.github/changelog-config.json'
    secrets:
      MAVEN_SONATYPE_USERNAME:
        required: true
      MAVEN_SONATYPE_TOKEN:
        required: true
      MAVEN_SONATYPE_SIGNING_KEY_ID:
        required: true
      MAVEN_SONATYPE_SIGNING_PUB_KEY_ASCII_ARMORED:
        required: true
      MAVEN_SONATYPE_SIGNING_KEY_ASCII_ARMORED:
        required: true
      MAVEN_SONATYPE_SIGNING_PASSWORD:
        required: true
      GRADLE_PUBLISH_KEY:
        required: true
      GRADLE_PUBLISH_SECRET:
        required: true

jobs:
  release:
    uses: 'zenhelix/ci-workflows/.github/workflows/release.yml@v2'
    with:
      changelog-config: '${{ inputs.changelog-config }}'

  publish:
    needs: release
    uses: 'zenhelix/ci-workflows/.github/workflows/publish.yml@v2'
    with:
      setup-action: 'gradle'
      setup-params: '{"java-version": "${{ inputs.java-version }}"}'
      publish-command: '${{ inputs.publish-command }}'
    secrets:
      MAVEN_SONATYPE_USERNAME: '${{ secrets.MAVEN_SONATYPE_USERNAME }}'
      MAVEN_SONATYPE_TOKEN: '${{ secrets.MAVEN_SONATYPE_TOKEN }}'
      MAVEN_SONATYPE_SIGNING_KEY_ID: '${{ secrets.MAVEN_SONATYPE_SIGNING_KEY_ID }}'
      MAVEN_SONATYPE_SIGNING_PUB_KEY_ASCII_ARMORED: '${{ secrets.MAVEN_SONATYPE_SIGNING_PUB_KEY_ASCII_ARMORED }}'
      MAVEN_SONATYPE_SIGNING_KEY_ASCII_ARMORED: '${{ secrets.MAVEN_SONATYPE_SIGNING_KEY_ASCII_ARMORED }}'
      MAVEN_SONATYPE_SIGNING_PASSWORD: '${{ secrets.MAVEN_SONATYPE_SIGNING_PASSWORD }}'
      GRADLE_PUBLISH_KEY: '${{ secrets.GRADLE_PUBLISH_KEY }}'
      GRADLE_PUBLISH_SECRET: '${{ secrets.GRADLE_PUBLISH_SECRET }}'
