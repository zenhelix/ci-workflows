name: 'Publish'

on:
  workflow_call:
    inputs:
      setup-action:
        description: 'Setup action to use: gradle, go'
        type: 'string'
        required: true
      setup-params:
        description: 'JSON object with setup parameters'
        type: 'string'
        required: false
        default: '{}'
      publish-command:
        description: 'Command to run for publishing'
        type: 'string'
        required: true
    secrets:
      GRADLE_PUBLISH_KEY:
        description: 'Gradle Plugin Portal publish key'
        required: false
      GRADLE_PUBLISH_SECRET:
        description: 'Gradle Plugin Portal publish secret'
        required: false
      MAVEN_SONATYPE_SIGNING_KEY_ID:
        description: 'GPG signing key ID'
        required: false
      MAVEN_SONATYPE_SIGNING_PUB_KEY_ASCII_ARMORED:
        description: 'GPG signing public key (ASCII armored)'
        required: false
      MAVEN_SONATYPE_SIGNING_KEY_ASCII_ARMORED:
        description: 'GPG signing private key (ASCII armored)'
        required: false
      MAVEN_SONATYPE_SIGNING_PASSWORD:
        description: 'GPG signing key passphrase'
        required: false
      MAVEN_SONATYPE_USERNAME:
        description: 'Maven Central (Sonatype) username'
        required: false
      MAVEN_SONATYPE_TOKEN:
        description: 'Maven Central (Sonatype) token'
        required: false

permissions:
  contents: 'read'

jobs:
  publish:
    name: 'Publish'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Setup Gradle'
        if: inputs.setup-action == 'gradle'
        uses: 'zenhelix/ci-workflows/.github/actions/setup-gradle@v2'
        with:
          java-version: '${{ fromJson(inputs.setup-params).java-version || ''17'' }}'

      - name: 'Setup Go'
        if: inputs.setup-action == 'go'
        uses: 'zenhelix/ci-workflows/.github/actions/setup-go@v2'
        with:
          go-version: '${{ fromJson(inputs.setup-params).go-version || ''1.22'' }}'

      - name: 'Setup Python'
        if: inputs.setup-action == 'python'
        uses: 'zenhelix/ci-workflows/.github/actions/setup-python@v2'
        with:
          python-version: '${{ fromJson(inputs.setup-params).python-version || ''3.12'' }}'

      - name: 'Publish'
        env:
          GRADLE_PUBLISH_KEY: '${{ secrets.GRADLE_PUBLISH_KEY }}'
          GRADLE_PUBLISH_SECRET: '${{ secrets.GRADLE_PUBLISH_SECRET }}'
          ORG_GRADLE_PROJECT_signingKeyId: '${{ secrets.MAVEN_SONATYPE_SIGNING_KEY_ID }}'
          ORG_GRADLE_PROJECT_signingPublicKey: '${{ secrets.MAVEN_SONATYPE_SIGNING_PUB_KEY_ASCII_ARMORED }}'
          ORG_GRADLE_PROJECT_signingKey: '${{ secrets.MAVEN_SONATYPE_SIGNING_KEY_ASCII_ARMORED }}'
          ORG_GRADLE_PROJECT_signingPassword: '${{ secrets.MAVEN_SONATYPE_SIGNING_PASSWORD }}'
          MAVEN_SONATYPE_USERNAME: '${{ secrets.MAVEN_SONATYPE_USERNAME }}'
          MAVEN_SONATYPE_TOKEN: '${{ secrets.MAVEN_SONATYPE_TOKEN }}'
        run: '${{ inputs.publish-command }}'
