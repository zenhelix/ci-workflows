name: 'Release'
on:
  workflow_call:
    inputs:
      changelog-config:
        description: 'Path to changelog configuration file'
        type: 'string'
        required: false
        default: '.github/changelog-config.json'
      draft:
        description: 'Create release as draft'
        type: 'boolean'
        required: false
        default: false
permissions:
  contents: 'write'
concurrency:
  group: 'release-${{ github.repository }}'
  cancel-in-progress: false
jobs:
  release:
    name: 'GitHub Release'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 15
    steps:
    - id: 'step-0'
      name: 'Check out'
      uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd'
      with:
        fetch-depth: '0'
    - id: 'changelog'
      name: 'Build Changelog'
      uses: 'mikepenz/release-changelog-builder-action@bcae7115752d4ed746ff92feb666574428a79415'
      with:
        configuration: '${{ inputs.changelog-config }}'
        toTag: '${{ github.ref_name }}'
      env:
        GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
    - id: 'step-2'
      name: 'Create Release'
      uses: 'softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda'
      with:
        body: '${{ steps.changelog.outputs.changelog }}'
        name: '${{ github.ref_name }}'
        tag_name: '${{ github.ref_name }}'
        draft: '${{ inputs.draft }}'
      env:
        GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
