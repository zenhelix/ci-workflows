name: 'Application Deploy'

on:
  workflow_call:
    inputs:
      setup-action:
        description: 'Setup action to use: gradle, go, python'
        type: 'string'
        required: true
      setup-params:
        description: 'JSON object with setup parameters'
        type: 'string'
        required: false
        default: '{}'
      deploy-command:
        description: 'Command to run for deployment'
        type: 'string'
        required: true
      tag:
        description: 'Tag/version to deploy (checked out at this ref)'
        type: 'string'
        required: true

permissions:
  contents: 'read'

jobs:
  deploy:
    name: 'Deploy'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Setup Gradle'
        if: inputs.setup-action == 'gradle'
        uses: 'zenhelix/ci-workflows/.github/actions/setup-gradle@v2'
        with:
          java-version: '${{ fromJson(inputs.setup-params).java-version || ''17'' }}'
          fetch-depth: '0'

      - name: 'Setup Go'
        if: inputs.setup-action == 'go'
        uses: 'zenhelix/ci-workflows/.github/actions/setup-go@v2'
        with:
          go-version: '${{ fromJson(inputs.setup-params).go-version || ''1.22'' }}'
          fetch-depth: '0'

      - name: 'Setup Python'
        if: inputs.setup-action == 'python'
        uses: 'zenhelix/ci-workflows/.github/actions/setup-python@v2'
        with:
          python-version: '${{ fromJson(inputs.setup-params).python-version || ''3.12'' }}'
          fetch-depth: '0'

      - name: 'Checkout tag'
        run: git checkout "${{ inputs.tag }}"

      - name: 'Deploy'
        run: '${{ inputs.deploy-command }}'
