name: 'CodeQL Analysis'

on:
  workflow_call:
    inputs:
      language:
        description: 'CodeQL language to analyze'
        type: 'string'
        required: false
        default: 'java-kotlin'
      java-version:
        description: 'JDK version to use for build'
        type: 'string'
        required: false
        default: '17'
      build-command:
        description: 'Build command to compile sources for CodeQL'
        type: 'string'
        required: false
        default: './gradlew classes testClasses'

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: 'Analyze'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language:
          - '${{ inputs.language }}'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '${{ inputs.java-version }}'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4

      - name: Build
        run: '${{ inputs.build-command }}'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: '/language:${{ matrix.language }}'
