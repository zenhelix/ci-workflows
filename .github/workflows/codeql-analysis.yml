name: 'CodeQL Analysis'
on:
  workflow_call:
    inputs:
      language:
        description: 'CodeQL language to analyze'
        type: 'string'
        required: false
        default: 'java-kotlin'
      java-version:
        description: 'JDK version to use for build'
        type: 'string'
        required: false
        default: '17'
permissions:
  security-events: 'write'
  contents: 'read'
  actions: 'read'
jobs:
  analyze:
    name: 'Analyze'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language:
        - '${{ inputs.language }}'
    steps:
    - id: 'step-0'
      name: 'Checkout'
      uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd'
    - id: 'step-1'
      name: 'Initialize CodeQL'
      uses: 'github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a'
      with:
        languages: '${{ matrix.language }}'
        build-mode: 'autobuild'
    - id: 'step-2'
      name: 'Setup Java'
      uses: 'actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654'
      with:
        java-version: '${{ inputs.java-version }}'
        distribution: 'temurin'
    - id: 'step-3'
      name: 'Setup Gradle'
      uses: 'gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c'
    - id: 'step-4'
      name: 'Perform CodeQL Analysis'
      uses: 'github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a'
      with:
        category: '/language:${{ matrix.language }}'
