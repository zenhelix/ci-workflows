version: 2
updates:
  # Composite actions each live in their own directory; Dependabot tracks them separately.
  # Root workflows under .github/workflows/ are 100% generated from Kotlin DSL
  # (src/main/kotlin/) and consume SHAs from build.gradle.kts bindings — so the
  # gradle ecosystem entry below is the source-of-truth update path for action
  # SHAs in those workflows. Do not add a `github-actions @ /` entry: it would
  # edit generated YAMLs directly, conflicting with gradle ecosystem PRs.
  - package-ecosystem: 'github-actions'
    directories:
      - '/.github/actions/setup-gradle'
      - '/.github/actions/setup-go'
      - '/.github/actions/setup-python'
      - '/.github/actions/create-app-token'
    schedule:
      interval: 'weekly'
    groups:
      actions:
        patterns: ['*']
    labels:
      - 'dependencies'
      - 'github-actions'

  # Gradle dependencies (github-workflows-kt, kaml, kotlinx-serialization).
  # JIT action bindings (actions:*, mikepenz:*, softprops:*, gradle:*, github:*)
  # are managed by Renovate — see renovate.json and Spec 9. Dependabot's gradle
  # ecosystem cannot distinguish SHA-shaped from tag-shaped versions and
  # regresses SHA pins to tag coords when both are published by the bindings
  # registry. Wildcards below suppress those PRs.
  - package-ecosystem: 'gradle'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'
      - 'gradle'
    ignore:
      - dependency-name: 'actions:*'
      - dependency-name: 'mikepenz:*'
      - dependency-name: 'softprops:*'
      - dependency-name: 'gradle:*'
      - dependency-name: 'github:*'
