name: 'Setup Go'
description: 'Checkout and setup Go with caching (architecture stub — not yet implemented)'

inputs:
  go-version:
    description: 'Go version to use'
    required: false
    default: '1.22'
  fetch-depth:
    description: 'Git fetch depth (0 for full history)'
    required: false
    default: '1'

runs:
  using: 'composite'
  steps:
    - name: 'Check out'
      uses: 'actions/checkout@v6'
      with:
        fetch-depth: '${{ inputs.fetch-depth }}'
    - name: 'Set up Go'
      uses: 'actions/setup-go@v5'
      with:
        go-version: '${{ inputs.go-version }}'
